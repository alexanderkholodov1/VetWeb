<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apadrinamiento - Por un Amigo Fiel</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="/__/firebase/12.11.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/12.11.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/12.11.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js"></script>
    <script defer src="js/firebase-client.js"></script>
    <script defer src="js/site.js"></script>
    <script defer src="js/forms.js"></script>
  </head>
  <body>
    <header class="header">
      <a href="index.html" class="logo-link"><img src="assets/logo.svg" class="logo-icon" alt="Logo" /><span>Por un Amigo Fiel</span></a>
      <nav class="main-nav">
        <a href="index.html">Inicio</a>
        <a href="eventos.html">Eventos</a>
        <a href="veterinarios.html">Veterinarios</a>
        <a href="citas.html">Agendar cita</a>
        <a href="reportes.html">Reportar caso</a>
        <a href="donaciones.html" class="active">Donar</a>
      </nav>
      <div class="header-actions">
        <span id="session-badge" class="muted">Sin sesión</span>
        <button id="open-auth-modal" class="btn btn-primary" type="button">Ingresar</button>
      </div>
    </header>

    <main>
      <section class="page-heading">
        <p class="kicker">Compromiso mensual</p>
        <h1>Apadrina un amigo fiel</h1>
        <p class="muted">Tu aporte mensual permite cubrir alimentación, chequeos y medicamentos.</p>
      </section>

      <section class="section-block">
        <article class="form-card">
          <form id="apadrinamiento-form" class="form-stack">
            <label>ID del animal<input name="animalId" required /></label>
            <label>Monto mensual en USD<input name="montoMensual" type="number" min="1" step="0.01" required /></label>
            <button type="submit" class="btn btn-primary">Confirmar apadrinamiento</button>
            <p id="apadrinamiento-feedback" class="feedback"></p>
          </form>
        </article>
      </section>
    </main>

    <footer class="footer"><p>Tu apoyo cambia una historia para siempre.</p></footer>

    <div id="auth-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-content" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
        <button type="button" class="modal-close" data-close-modal="true" aria-label="Cerrar">×</button>
        <h2 id="auth-modal-title">Ingresar a tu cuenta</h2>
        <form id="auth-form" class="form-stack">
          <label>Correo electrónico<input type="email" name="email" required /></label>
          <label>Contraseña<input type="password" name="password" minlength="6" required /></label>
          <div class="row-buttons auth-mode-row"><button type="button" data-auth-mode="login" class="btn btn-soft">Ya tengo cuenta</button><button type="button" data-auth-mode="register" class="btn btn-soft">Crear cuenta</button></div><button type="submit" id="auth-submit-button" class="btn btn-primary full">Ingresar</button>
          <button id="logout-button" type="button" class="btn btn-ghost full">Cerrar sesión</button>
          <p id="auth-feedback" class="feedback"></p>
        </form>
      </section>
    </div>
  </body>
</html>
